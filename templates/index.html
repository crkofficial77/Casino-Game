<!DOCTYPE html>
<html>
<head>

<title>Lucky 9 Casino</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

body{
background:radial-gradient(circle,#1a0033,#090014);
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:900px;
margin:auto;
margin-top:40px;
background:#140028;
padding:30px;
border-radius:20px;
}

.cards img{
width:90px;
margin:6px;
opacity:0;
transform:translateY(-40px);
transition:.4s;
}

.cards img.show{
opacity:1;
transform:translateY(0);
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#7b00ff;
color:white;
cursor:pointer;
}

button:hover{
background:#9f44ff;
}

input{
padding:10px;
font-size:16px;
}

#fightBtn{
display:none;
}

#winner{
font-size:30px;
color:gold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎰 Lucky 9 Casino</h1>

Coins: <span id="coins">1000</span>

<br><br>

<input id="room" placeholder="Room name">

<br><br>

<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<br><br>

Bet
<input id="bet" type="number">

<br>

<button onclick="ready()">READY</button>

<h2 id="status"></h2>

<hr>

<h2>Player 1</h2>
<div id="p1Cards" class="cards"></div>
<div id="p1Score"></div>

<h2>Player 2</h2>
<div id="p2Cards" class="cards"></div>
<div id="p2Score"></div>

<br>

<button id="fightBtn" onclick="play()">FIGHT</button>

<h2 id="winner"></h2>

</div>

<script>

var socket = io()
var room=""
var coins=1000

function createRoom(){

room=document.getElementById("room").value

socket.emit("create_room",{room:room})

}

function joinRoom(){

room=document.getElementById("room").value

socket.emit("join_room",{room:room})

}

function ready(){

socket.emit("ready",{room:room})

}

function play(){

let bet=parseInt(document.getElementById("bet").value)

if(bet>coins){
alert("Not enough coins")
return
}

coins-=bet
document.getElementById("coins").innerHTML=coins

socket.emit("play",{room:room,bet:bet})

}

socket.on("room_created",function(data){
document.getElementById("status").innerHTML="Room created: "+data.room
})

socket.on("room_exists",function(){
document.getElementById("status").innerHTML="Room already exists"
})

socket.on("room_not_found",function(){
document.getElementById("status").innerHTML="Room not found"
})

socket.on("room_full",function(){
document.getElementById("status").innerHTML="Room full"
})

socket.on("start",function(){
document.getElementById("status").innerHTML="Player joined! Game ready"
})

socket.on("readyCount",function(data){

document.getElementById("status").innerHTML=data.ready+" players ready"

if(data.ready==2){
document.getElementById("fightBtn").style.display="inline-block"
}

})

function cardImage(code){
return "https://deckofcardsapi.com/static/img/"+code+".png"
}

function deal(container,cards){

container.innerHTML=""

cards.forEach((c,i)=>{

let img=document.createElement("img")

img.src=cardImage(c.code)

setTimeout(()=>{
img.classList.add("show")
},300*i)

container.appendChild(img)

})

}

socket.on("result",function(data){

deal(document.getElementById("p1Cards"),data.p1_cards)
deal(document.getElementById("p2Cards"),data.p2_cards)

document.getElementById("p1Score").innerHTML="Score: "+data.p1_score
document.getElementById("p2Score").innerHTML="Score: "+data.p2_score

document.getElementById("winner").innerHTML=data.winner

if(data.win){
coins+=data.pot
document.getElementById("coins").innerHTML=coins
}

})

</script>

</body>
</html>
