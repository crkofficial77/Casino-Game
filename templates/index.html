<!DOCTYPE html>
<html>
<head>
<title>Lucky 9 Casino Online</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

body{
    background: linear-gradient(135deg,#12002b,#3a0066);
    font-family: 'Segoe UI', Arial;
    color:white;
    text-align:center;
}

/* main table */
.container{
    width:760px;
    margin:auto;
    margin-top:40px;
    background: rgba(30,0,60,0.9);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 40px #7a2cff;
}

h1{
    color:#d9a3ff;
    font-size:40px;
}

/* divider */
hr{
    border:1px solid #7a2cff;
    margin:20px 0;
}

.cards{
    min-height:110px;
}

.cards img{
    width:90px;
    margin:6px;
    transition: transform .2s;
}

.cards img:hover{
    transform:scale(1.1);
}

/* buttons */

button{
    padding:12px 28px;
    font-size:16px;
    background:#7a2cff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    margin:10px;
    transition:0.2s;
}

button:hover{
    background:#a855ff;
    transform:scale(1.05);
}

button:disabled{
    background:#555;
}

/* inputs */

input{
    padding:10px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

/* winner text */

#winner{
    font-size:32px;
    color:#ffd700;
    margin-top:20px;
}

.playerBox{
    background:rgba(60,0,120,0.5);
    border-radius:15px;
    padding:15px;
    margin:15px 0;
}

.score{
    font-size:18px;
    margin-top:5px;
    color:#e0c3ff;
}

</style>
</head>

<body>

<div class="container">

<h1>🎰 Lucky 9 Casino</h1>

<input id="room" placeholder="Room name">
<br><br>

<button onclick="join()">Join Game</button>

<h2 id="status"></h2>

<hr>

<div class="playerBox">
<h2>Player 1</h2>
<div id="p1Cards" class="cards"></div>
<div id="p1Score" class="score"></div>
</div>

<div class="playerBox">
<h2>Player 2</h2>
<div id="p2Cards" class="cards"></div>
<div id="p2Score" class="score"></div>
</div>

<button onclick="play()">🎴 Deal Cards</button>
<button onclick="hit()">➕ Hit (Request Card)</button>

<h2 id="winner"></h2>

</div>

<script>

var socket = io();
var room = "";

function join(){
    room = document.getElementById("room").value
    socket.emit("join",{room:room})
}

socket.on("waiting",function(){
    document.getElementById("status").innerHTML="Waiting for Player 2..."
})

socket.on("start",function(){
    document.getElementById("status").innerHTML="Game Started!"
})

socket.on("full",function(){
    document.getElementById("status").innerHTML="Room already full"
})

function play(){
    socket.emit("play",{room:room})
}

/* request another card */
function hit(){
    socket.emit("hit",{room:room})
}

function cardImage(code){
    return "https://deckofcardsapi.com/static/img/" + code + ".png"
}

socket.on("result",function(data){

let p1HTML=""
let p2HTML=""

data.p1_cards.forEach(c=>{
p1HTML += "<img src='"+cardImage(c.code)+"'>"
})

data.p2_cards.forEach(c=>{
p2HTML += "<img src='"+cardImage(c.code)+"'>"
})

document.getElementById("p1Cards").innerHTML = p1HTML
document.getElementById("p2Cards").innerHTML = p2HTML

document.getElementById("p1Score").innerHTML = "Score: "+data.p1_score
document.getElementById("p2Score").innerHTML = "Score: "+data.p2_score

document.getElementById("winner").innerHTML = data.winner

})

</script>

</body>
</html>
