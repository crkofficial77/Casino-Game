<!DOCTYPE html>
<html>
<head>

<title>Lucky 9 Casino Online</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

body{
background:#0b3d0b;
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:720px;
margin:auto;
margin-top:40px;
background:#145214;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px black;
}

h1{
color:gold;
}

.cards img{
width:90px;
margin:6px;
}

button{
padding:12px 30px;
font-size:18px;
background:gold;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:orange;
}

input{
padding:10px;
font-size:16px;
}

#winner{
font-size:30px;
color:gold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎰 Lucky 9 Casino</h1>

<input id="room" placeholder="Room name">
<br><br>
<button onclick="join()">Join Game</button>

<h2 id="status"></h2>

<hr>

<h2>Player 1</h2>
<div id="p1Cards" class="cards"></div>
<div id="p1Score"></div>

<h2>Player 2</h2>
<div id="p2Cards" class="cards"></div>
<div id="p2Score"></div>

<button onclick="play()">Play Round</button>

<h2 id="winner"></h2>

</div>

<script>

var socket = io();
var room = "";

function join(){

room = document.getElementById("room").value
socket.emit("join",{room:room})

}

socket.on("waiting",function(){
document.getElementById("status").innerHTML="Waiting for Player 2..."
})

socket.on("start",function(){
document.getElementById("status").innerHTML="Game Started!"
})

socket.on("full",function(){
document.getElementById("status").innerHTML="Room already full"
})

function play(){
socket.emit("play",{room:room})
}

function cardImage(code){
return "https://deckofcardsapi.com/static/img/" + code + ".png"
}

socket.on("result",function(data){

let p1HTML=""
let p2HTML=""

data.p1_cards.forEach(c=>{
p1HTML += "<img src='"+cardImage(c.code)+"'>"
})

data.p2_cards.forEach(c=>{
p2HTML += "<img src='"+cardImage(c.code)+"'>"
})

document.getElementById("p1Cards").innerHTML = p1HTML
document.getElementById("p2Cards").innerHTML = p2HTML

document.getElementById("p1Score").innerHTML = "Score: "+data.p1_score
document.getElementById("p2Score").innerHTML = "Score: "+data.p2_score

document.getElementById("winner").innerHTML = data.winner

})

</script>

</body>
</html>
